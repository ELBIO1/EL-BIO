<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة الرئيسية - EL~BIO</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .logo {
            font-size: 48px;
            font-weight: bold;
            color: gold;
            animation: fadeIn 2s ease-in-out;
        }
        .icons {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }
        .icons a {
            background: rgba(255, 215, 0, 0.9);
            padding: 20px;
            border-radius: 50%;
            text-decoration: none;
            color: black;
            font-size: 24px;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }
        .icons a:hover {
            background: darkgoldenrod;
            box-shadow: 0 0 20px rgba(255, 215, 0, 1);
        }
        .dna {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            animation: float 4s infinite alternate;
        }
        .skeleton {
            position: absolute;
            bottom: 5px;
            left: 10px;
            width: 180px;
        }
        .plants {
            position: absolute;
            bottom: 0;
            right: 10px;
            width: 140px;
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        @keyframes float {
            0% { transform: translateY(0) translateX(-50%); }
            100% { transform: translateY(-20px) translateX(-50%); }
        }
    </style>
</head>
<body>
    <img src="dna.png" class="dna" alt="DNA">
    <img src="skeleton.png" class="skeleton" alt="Skeleton">
    <img src="plants.png" class="plants" alt="Plants">
    
    <div class="container">
        <div class="logo">EL~BIO</div>
        <div class="icons">
            <a href="videos.html">🎥</a>
            <a href="tests.html">📝</a>
            <a href="pdf.html">📄</a>
        </div>
    </div>
</body>
</html>
