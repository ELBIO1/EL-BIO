<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة الرئيسية - EL~BIO</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .icons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .icons a {
            background: rgba(255, 215, 0, 0.8);
            padding: 15px;
            border-radius: 50%;
            text-decoration: none;
            color: black;
            font-size: 20px;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .icons a:hover {
            background: darkgoldenrod;
        }
        .dna {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            animation: float 4s infinite alternate;
        }
        .skeleton {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 150px;
        }
        .plants {
            position: absolute;
            bottom: 0;
            right: 10px;
            width: 120px;
        }
        @keyframes float {
            0% { transform: translateY(0) translateX(-50%); }
            100% { transform: translateY(-20px) translateX(-50%); }
        }
    </style>
</head>
<body>
    <img src="dna.png" class="dna" alt="DNA">
    <img src="skeleton.png" class="skeleton" alt="Skeleton">
    <img src="plants.png" class="plants" alt="Plants">
    
    <div class="container">
        <h1>مرحبًا بك في منصة EL~BIO</h1>
        <div class="icons">
            <a href="#videos">🎥</a>
            <a href="#tests">📝</a>
            <a href="#pdf">📄</a>
        </div>
    </div>
</body>
</html>
